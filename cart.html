<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cart | Sever Gallery</title>
  <meta name="description" content="Your shopping cart - Sever Gallery original paintings and clothing.">
  <link rel="icon" type="image/gif" href="images/logo.gif">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root{--font-heading:'Bebas Neue',sans-serif;--font-body:'Inter',sans-serif;--color-background:#000;--color-foreground:#fff;--color-primary:#c0c0c0;--color-secondary:#0d0d0d;--color-border:#333;--page-width:1400px;--header-height:70px}*{box-sizing:border-box;margin:0;padding:0}html{font-size:62.5%}body{font-family:var(--font-body);font-size:1.4rem;line-height:1.6;color:var(--color-foreground);background-color:var(--color-background)}a{color:inherit;text-decoration:none}img{max-width:100%;height:auto;display:block}.page-width{max-width:var(--page-width);margin:0 auto;padding:0 40px}
    .header{position:fixed;top:0;left:0;right:0;z-index:1000;background:var(--color-background);border-bottom:1px solid var(--color-border)}.header__inner{display:flex;align-items:center;justify-content:center;height:var(--header-height);position:relative}.header__nav{display:flex;gap:40px}.header__nav a{font-family:var(--font-heading);font-size:1.4rem;letter-spacing:.15em;transition:color .3s ease}.header__nav a:hover{color:var(--color-primary)}.header__icons{position:absolute;right:40px}.header__icon{width:40px;height:40px;display:flex;align-items:center;justify-content:center;transition:color .3s ease}.header__icon:hover{color:var(--color-primary)}.header__icon svg{width:20px;height:20px}.mobile-menu-btn{display:none;flex-direction:column;gap:5px;background:0 0;border:none;cursor:pointer;padding:5px;position:absolute;left:20px}.mobile-menu-btn span{width:24px;height:2px;background:var(--color-foreground)}
    .cart-badge{position:absolute;top:-5px;right:-5px;background:var(--color-primary);color:var(--color-background);font-size:1rem;font-weight:600;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center}
    .page-header{padding:150px 0 50px;border-bottom:1px solid var(--color-border);margin-bottom:50px}.page-header__title{font-family:var(--font-heading);font-size:4rem;letter-spacing:.15em}
    .cart{padding-bottom:100px}.cart__empty{text-align:center;padding:80px 0}.cart__empty p{font-size:1.6rem;opacity:.7;margin-bottom:30px}.cart__empty a{display:inline-block;padding:15px 40px;font-family:var(--font-heading);font-size:1.4rem;letter-spacing:.15em;border:1px solid var(--color-foreground);transition:all .3s ease}.cart__empty a:hover{background:var(--color-foreground);color:var(--color-background)}
    .cart__items{margin-bottom:50px}.cart__item{display:grid;grid-template-columns:120px 1fr auto;gap:30px;padding:30px 0;border-bottom:1px solid var(--color-border);align-items:center}.cart__item-image{width:120px;height:150px;background:var(--color-secondary);overflow:hidden}.cart__item-image img{width:100%;height:100%;object-fit:cover}.cart__item-details h3{font-family:var(--font-heading);font-size:1.8rem;letter-spacing:.1em;margin-bottom:5px}.cart__item-details p{font-size:1.3rem;opacity:.7;margin-bottom:5px}.cart__item-price{font-family:var(--font-heading);font-size:1.6rem;color:var(--color-primary)}
    .cart__item-actions{display:flex;align-items:center;gap:20px}.cart__quantity{display:flex;align-items:center;gap:10px}.cart__quantity button{width:30px;height:30px;background:var(--color-secondary);border:1px solid var(--color-border);color:var(--color-foreground);font-size:1.6rem;cursor:pointer;transition:all .3s ease}.cart__quantity button:hover{border-color:var(--color-primary)}.cart__quantity span{font-family:var(--font-heading);font-size:1.6rem;min-width:30px;text-align:center}.cart__remove{background:none;border:none;color:var(--color-primary);font-size:1.2rem;cursor:pointer;opacity:.7;transition:opacity .3s ease}.cart__remove:hover{opacity:1}
    .cart__summary{max-width:400px;margin-left:auto;padding:30px;background:var(--color-secondary)}.cart__summary-row{display:flex;justify-content:space-between;margin-bottom:15px;font-size:1.4rem}.cart__summary-row.total{font-family:var(--font-heading);font-size:2rem;padding-top:15px;border-top:1px solid var(--color-border);margin-bottom:25px}.cart__checkout-btn{display:block;width:100%;padding:18px;font-family:var(--font-heading);font-size:1.4rem;letter-spacing:.2em;text-align:center;background:var(--color-primary);color:var(--color-background);border:none;cursor:pointer;transition:all .3s ease}.cart__checkout-btn:hover{opacity:.8}.cart__continue{display:block;text-align:center;margin-top:15px;font-size:1.3rem;opacity:.7;transition:opacity .3s ease}.cart__continue:hover{opacity:1}
    .footer{background:#050505;border-top:1px solid var(--color-border);padding:60px 0 30px;margin-top:80px}.footer__inner{display:grid;grid-template-columns:repeat(4,1fr);gap:40px}.footer__title{font-family:var(--font-heading);font-size:1.3rem;letter-spacing:.15em;color:var(--color-primary);margin-bottom:20px}.footer__links{list-style:none}.footer__links li{margin-bottom:10px}.footer__links a{font-size:1.3rem;opacity:.7;transition:all .3s ease}.footer__links a:hover{opacity:1;color:var(--color-primary)}.footer__social{display:flex;gap:15px;margin-top:20px}.footer__social a{display:flex;align-items:center;justify-content:center;width:40px;height:40px;border:1px solid var(--color-border);transition:all .3s ease}.footer__social a:hover{border-color:var(--color-primary);color:var(--color-primary)}.footer__social svg{width:18px;height:18px}.footer__bottom{margin-top:50px;padding-top:30px;border-top:1px solid var(--color-border);text-align:center}.footer__copyright{font-size:1.2rem;opacity:.5}
    .mobile-menu{display:none;position:fixed;top:var(--header-height);left:0;right:0;bottom:0;background:var(--color-background);z-index:999;padding:40px 20px}.mobile-menu.active{display:block}.mobile-menu a{display:block;padding:20px 0;font-family:var(--font-heading);font-size:2rem;letter-spacing:.1em;border-bottom:1px solid var(--color-border)}
    @media(max-width:768px){.page-width{padding:0 20px}.header__nav{display:none}.header__icons{right:20px}.mobile-menu-btn{display:flex}.page-header__title{font-size:3rem}.cart__item{grid-template-columns:80px 1fr;gap:15px}.cart__item-image{width:80px;height:100px}.cart__item-actions{flex-direction:column;align-items:flex-start;gap:10px}.cart__summary{max-width:100%}.footer__inner{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <header class="header"><div class="page-width"><div class="header__inner"><button class="mobile-menu-btn" id="mobileMenuBtn" aria-label="Open menu"><span></span><span></span><span></span></button><nav class="header__nav"><a href="index.html">HOME</a><a href="shop.html">SHOP</a><a href="index.html#commissions">COMMISSIONS</a><a href="about.html">ABOUT</a><a href="contact.html">CONTACT</a></nav><div class="header__icons"><a href="cart.html" class="header__icon" aria-label="Cart"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg></a></div></div></div></header>
  <nav class="mobile-menu" id="mobileMenu"><a href="index.html">HOME</a><a href="shop.html">SHOP</a><a href="index.html#commissions">COMMISSIONS</a><a href="about.html">ABOUT</a><a href="contact.html">CONTACT</a><a href="cart.html">CART</a></nav>

  <div class="page-width">
    <div class="page-header">
      <h1 class="page-header__title">YOUR CART</h1>
    </div>

    <div class="cart">
      <div id="cartContent"></div>
    </div>
  </div>

  <footer class="footer"><div class="page-width"><div class="footer__inner"><div class="footer__column"><h4 class="footer__title">SHOP</h4><ul class="footer__links"><li><a href="shop.html">Paintings</a></li><li><a href="shop.html">Prints</a></li><li><a href="shop.html">Clothes</a></li></ul></div><div class="footer__column"><h4 class="footer__title">INFO</h4><ul class="footer__links"><li><a href="about.html">About</a></li><li><a href="contact.html">Contact</a></li><li><a href="shipping.html">Shipping</a></li><li><a href="returns.html">Returns</a></li><li><a href="privacy.html">Privacy Policy</a></li></ul></div><div class="footer__column"><h4 class="footer__title">FOLLOW</h4><div class="footer__social"><a href="https://www.instagram.com/severgallery" target="_blank" aria-label="Instagram"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></svg></a><a href="https://www.tiktok.com/@severgallery_" target="_blank" aria-label="TikTok"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-5.2 1.74 2.89 2.89 0 0 1 2.31-4.64 2.93 2.93 0 0 1 .88.13V9.4a6.84 6.84 0 0 0-1-.05A6.33 6.33 0 0 0 5 20.1a6.34 6.34 0 0 0 10.86-4.43v-7a8.16 8.16 0 0 0 4.77 1.52v-3.4a4.85 4.85 0 0 1-1-.1z"/></svg></a></div></div><div class="footer__column"><h4 class="footer__title">CONTACT</h4><ul class="footer__links"><li><a href="mailto:severgallery@gmail.com">severgallery@gmail.com</a></li></ul></div></div><div class="footer__bottom"><p class="footer__copyright">©2026 Sever Gallery. All rights reserved.</p></div></div></footer>

  <script src="js/cart.js"></script>
  <script>
    document.getElementById('mobileMenuBtn').addEventListener('click', function() {
      document.getElementById('mobileMenu').classList.toggle('active');
    });

    function renderCart() {
      const cart = SeverCart.getCart();
      const container = document.getElementById('cartContent');

      if (cart.length === 0) {
        container.innerHTML = `
          <div class="cart__empty">
            <p>Your cart is empty</p>
            <a href="shop.html">CONTINUE SHOPPING</a>
          </div>
        `;
        return;
      }

      let itemsHtml = '<div class="cart__items">';
      cart.forEach(item => {
        itemsHtml += `
          <div class="cart__item">
            <div class="cart__item-image">
              <img src="${item.image}" alt="${item.name}">
            </div>
            <div class="cart__item-details">
              <h3>${item.name}</h3>
              ${item.size ? `<p>Size: ${item.size}</p>` : ''}
              <p class="cart__item-price">$${item.price.toFixed(2)}</p>
            </div>
            <div class="cart__item-actions">
              <div class="cart__quantity">
                <button onclick="updateQty('${item.priceId}', '${item.size || ''}', -1)" aria-label="Decrease quantity">−</button>
                <span>${item.quantity}</span>
                <button onclick="updateQty('${item.priceId}', '${item.size || ''}', 1)" aria-label="Increase quantity">+</button>
              </div>
              <button class="cart__remove" onclick="removeItem('${item.priceId}', '${item.size || ''}')">REMOVE</button>
            </div>
          </div>
        `;
      });
      itemsHtml += '</div>';

      const subtotal = SeverCart.getTotal();
      const summaryHtml = `
        <div class="cart__summary">
          <div class="cart__summary-row">
            <span>Subtotal</span>
            <span>$${subtotal.toFixed(2)}</span>
          </div>
          <div class="cart__summary-row">
            <span>Shipping</span>
            <span>Calculated at checkout</span>
          </div>
          <div class="cart__summary-row total">
            <span>TOTAL</span>
            <span>$${subtotal.toFixed(2)}</span>
          </div>
          <button class="cart__checkout-btn" onclick="SeverCart.checkout()">CHECKOUT</button>
          <a href="shop.html" class="cart__continue">Continue Shopping</a>
        </div>
      `;

      container.innerHTML = itemsHtml + summaryHtml;
    }

    function updateQty(priceId, size, change) {
      const cart = SeverCart.getCart();
      const item = cart.find(i => i.priceId === priceId && (i.size || '') === size);
      if (item) {
        SeverCart.updateQuantity(priceId, size, item.quantity + change);
        renderCart();
      }
    }

    function removeItem(priceId, size) {
      SeverCart.removeItem(priceId, size);
      renderCart();
    }

    renderCart();
  </script>
</body>
</html>
